<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小宝伴眠助手</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Permanent+Marker&display=swap");

    :root {
      --light-clr: #e5e5e5;
      --primary-clr: #6490f6;
      --secondary-clr: #c1daff;
      --active-clr: rgba(149, 153, 186, 0.4);
      --player-bg: rgba(5, 9, 51, 0.4);
      --scrollbar-track: rgb(79, 78, 78);
      --scrollbar-thumb: rgb(116, 116, 116);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
    }

    p {
      font-size: clamp(1.4rem, 6vw, 2rem);
    }

    body {
      font-family: "Nunito", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #001124;
      background-image: url(https://github.com/user-attachments/assets/47953c98-49f4-4a40-8b2f-36543a0dd1a3);
      background-repeat: no-repeat;
      background-size: cover;
    }

    main {
      position: relative;
      width: 90%;
      height: 90%;
      background: transparent;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.4);
      border-radius: 15px;
      overflow: hidden;
    }

    main::after,
    main::before {
      content: "";
      position: absolute;
      width: 250px;
      aspect-ratio: 1/1;
      border-radius: 50%;
      transition: 5s ease-in-out;
    }

    main::after {
      top: -3%;
      left: -5%;
      transform: scale(1);
      background-color: #5768af;
    }

    main:hover::after {
      left: 85%;
      transform: scale(1.2);
      background-color: #a0acbd;
    }

    main::before {
      bottom: -3%;
      right: -5%;
      transform: scale(1);
      background-color: #ab4c72;
    }

    main:hover::before {
      right: 85%;
      transform: scale(1.2);
      background-color: #bda5ad;
    }

    .content {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: rgba(53, 54, 72, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: inherit;
      box-shadow: 0 0.5px 0 1px rgba(255, 255, 255, 0.2) inset,
        0 1px 0 0 rgba(255, 255, 255, 0.6) inset, 0 4px 16px rgba(0, 0, 0, 0.1);
      z-index: 10;
      color: var(--light-clr);
      overflow: hidden;
    }

    .header-area {
      flex-shrink: 0;
      padding: 16px 20px 8px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-bottom: 12px;
    }

    .header-area .app-title {
      font-size: 1.82rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--light-clr);
      text-shadow: 0 0 12px rgba(100, 144, 246, 0.6);
    }

    .toggle-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .toggle-label-text {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 6px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .header-area .swiper {
      width: 200px;
      margin: 0 auto;
    }

    .swiper-slide {
      display: grid;
      grid-template-rows: 4fr 1fr;
      padding: 10px;
      border-radius: 8px;
      background-color: #ffffff;
      border: 1px solid #c8c8c8;
      user-select: none;
    }

    .swiper-slide img {
      aspect-ratio: 1/1;
      border-radius: 4px;
      margin-bottom: 10px;
      pointer-events: none;
    }

    .swiper-slide h1 {
      width: max-content;
      font-family: "Permanent Marker", serif;
      font-size: clamp(1.2rem, 5vw, 1.6rem);
      letter-spacing: 2px;
      color: #222224;
      text-transform: uppercase;
      transform: rotate(-3deg);
      margin: auto;
    }

    .playlist-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 20px;
    }

    .playlist-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .playlist-scroll::-webkit-scrollbar-track {
      box-shadow: inset 0 0 0.3rem var(--scrollbar-track);
      border-radius: 40px;
      margin: 8px 0;
    }

    .playlist-scroll::-webkit-scrollbar-thumb {
      box-shadow: inset 0 0 0.5rem var(--scrollbar-thumb);
      background-color: var(--primary-clr);
      outline: none;
      border-radius: 40px;
    }

    .playlist-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 10px;
      border-bottom: 1.5px solid var(--primary-clr);
      color: var(--light-clr);
      cursor: pointer;
      user-select: none;
      transition: background-color 0.3s, border-radius 0.3s;
    }

    .playlist-item .pl-cover {
      width: 9%;
      flex-shrink: 0;
    }

    .playlist-item .pl-cover img {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 4px;
    }

    .playlist-item .song {
      flex: 1;
      padding: 0 10px;
      min-width: 0;
    }

    .playlist-item .song p:nth-child(1) {
      font-weight: 500;
      margin-bottom: 2px;
      font-size: clamp(1.4rem, 5vw, 1.8rem);
    }

    .playlist-item .song p:nth-child(2) {
      font-weight: 300;
      opacity: 0.5;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
    }

    .playlist-item .pl-duration {
      width: 60px;
      text-align: center;
      flex-shrink: 0;
      font-size: clamp(1.3rem, 5vw, 1.7rem);
      opacity: 0.6;
    }

    .playlist-item .pl-progress-row {
      width: 100%;
      height: 0;
      overflow: hidden;
      opacity: 0;
      transition: height 0.3s ease, opacity 0.3s ease, margin 0.3s ease;
    }

    .playlist-item.is-playing .pl-progress-row {
      height: 22px;
      opacity: 1;
      margin-top: 6px;
    }

    .playlist-item .pl-progress-row input[type="range"] {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: linear-gradient(
        90deg,
        var(--light-clr),
        var(--secondary-clr),
        var(--primary-clr),
        var(--secondary-clr),
        var(--light-clr)
      );
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }

    .playlist-item .pl-progress-row input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      background: var(--light-clr);
      width: 12px;
      aspect-ratio: 1/1;
      border-radius: 50%;
      cursor: pointer;
    }

    .active-playlist-item {
      background-color: var(--active-clr);
      border-radius: 5px;
    }

    .bottom-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 14px 24px 16px;
      background: rgba(5, 9, 51, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
    }

    .volume-stack {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex: 1;
      max-width: 420px;
    }

    .volume-panel {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(5, 9, 51, 0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    }

    .volume-panel .vp-label {
      font-size: 1.44rem;
      color: var(--light-clr);
      opacity: 0.7;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 56px;
      text-align: right;
    }

    .volume-panel .vp-icon {
      font-size: 1.9rem;
      color: var(--light-clr);
      opacity: 0.8;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }

    .volume-panel input[type="range"] {
      flex: 1;
      appearance: none;
      -webkit-appearance: none;
      height: 5px;
      background: var(--primary-clr);
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }

    .volume-panel input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      background: var(--light-clr);
      width: 14px;
      aspect-ratio: 1/1;
      border-radius: 50%;
      cursor: pointer;
    }

    .play-btn-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #playPauseBtn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      aspect-ratio: 1/1;
      color: var(--primary-clr);
      outline: 0;
      background: var(--light-clr);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      box-shadow: 0 10px 20px rgba(5, 36, 28, 0.3);
      font-size: 2rem;
      transform: scale(1);
      will-change: transform;
      cursor: pointer;
    }

    #playPauseBtn:hover {
      transform: scale(1.05);
    }

    @media (max-width: 900px) {
      .header-area .swiper {
        width: 170px;
      }
      .playlist-scroll {
        padding: 0 14px;
      }
      .bottom-bar {
        padding: 12px 16px 14px;
        gap: 14px;
      }
      .volume-stack {
        max-width: 320px;
        gap: 16px;
      }
    }

    @media (max-width: 580px) {
      .header-area {
        padding: 12px 14px 6px;
      }
      .header-row {
        gap: 14px;
      }
      .header-area .app-title {
        font-size: 1.56rem;
        letter-spacing: 3px;
      }
      .toggle-label-text {
        font-size: 0.72rem;
      }
      .toggle-container {
        transform: scale(0.55);
      }
      .header-area .swiper {
        width: 150px;
      }
      .playlist-scroll {
        padding: 0 10px;
      }
      .playlist-item .pl-cover {
        width: 12%;
      }
      .playlist-item .pl-duration {
        width: 48px;
        font-size: 1.2rem;
      }
      .bottom-bar {
        padding: 10px 12px 12px;
        gap: 10px;
      }
      .volume-panel .vp-label {
        font-size: 1.24rem;
        min-width: 44px;
      }
      .volume-panel .vp-icon {
        font-size: 1.6rem;
      }
      #playPauseBtn {
        width: 52px;
        font-size: 1.6rem;
      }
    }

    .toggle-container {
      position: relative;
      width: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      perspective: 800px;
      z-index: 5;
      transform: scale(0.67);
      transform-origin: center top;
    }

    .toggle-wrap {
      position: relative;
      width: 100%;
      height: 60px;
      transform-style: preserve-3d;
    }

    .toggle-input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 30, 60, 0.4);
      border-radius: 30px;
      cursor: pointer;
      box-shadow:
        0 0 15px rgba(0, 80, 255, 0.2),
        inset 0 0 10px rgba(0, 0, 0, 0.8);
      overflow: hidden;
      backdrop-filter: blur(5px);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      border: 1px solid rgba(0, 150, 255, 0.3);
    }

    .toggle-track::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
          ellipse at center,
          rgba(0, 80, 255, 0.1) 0%,
          rgba(0, 0, 0, 0) 70%
        ),
        linear-gradient(90deg, rgba(0, 60, 120, 0.1) 0%, rgba(0, 30, 60, 0.2) 100%);
      opacity: 0.6;
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .toggle-track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      right: 2px;
      height: 10px;
      background: linear-gradient(
        90deg,
        rgba(0, 170, 255, 0.3) 0%,
        rgba(0, 80, 255, 0.1) 100%
      );
      border-radius: 30px 30px 0 0;
      opacity: 0.7;
      filter: blur(1px);
    }

    .track-lines {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      transform: translateY(-50%);
      overflow: hidden;
    }

    .track-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        90deg,
        rgba(0, 150, 255, 0.3) 0px,
        rgba(0, 150, 255, 0.3) 5px,
        transparent 5px,
        transparent 15px
      );
      animation: track-line-move 3s linear infinite;
    }

    @keyframes track-line-move {
      0% { transform: translateX(0); }
      100% { transform: translateX(20px); }
    }

    .toggle-thumb {
      position: absolute;
      width: 54px;
      height: 54px;
      left: 3px;
      top: 3px;
      background: radial-gradient(
        circle,
        rgba(10, 40, 90, 0.9) 0%,
        rgba(0, 20, 50, 0.8) 100%
      );
      border-radius: 50%;
      box-shadow:
        0 2px 15px rgba(0, 0, 0, 0.5),
        inset 0 0 15px rgba(0, 150, 255, 0.5);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      z-index: 2;
      border: 1px solid rgba(0, 170, 255, 0.6);
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .thumb-core {
      position: absolute;
      width: 40px;
      height: 40px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(
        circle,
        rgba(0, 180, 255, 0.6) 0%,
        rgba(0, 50, 120, 0.2) 100%
      );
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(0, 150, 255, 0.5);
      opacity: 0.9;
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .thumb-inner {
      position: absolute;
      width: 25px;
      height: 25px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(
        circle,
        rgba(255, 255, 255, 0.8) 0%,
        rgba(100, 200, 255, 0.5) 100%
      );
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(100, 200, 255, 0.7);
      opacity: 0.7;
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
      100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
    }

    .thumb-scan {
      position: absolute;
      width: 100%;
      height: 5px;
      background: linear-gradient(
        90deg,
        rgba(0, 0, 0, 0) 0%,
        rgba(0, 150, 255, 0.5) 20%,
        rgba(255, 255, 255, 0.8) 50%,
        rgba(0, 150, 255, 0.5) 80%,
        rgba(0, 0, 0, 0) 100%
      );
      top: 0;
      left: 0;
      filter: blur(1px);
      animation: thumb-scan 2s linear infinite;
      opacity: 0.7;
    }

    @keyframes thumb-scan {
      0% { top: -5px; opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.7; }
      100% { top: 54px; opacity: 0; }
    }

    .thumb-particles {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
    }

    .thumb-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(100, 200, 255, 0.8);
      border-radius: 50%;
      box-shadow: 0 0 5px rgba(100, 200, 255, 0.8);
      animation: thumb-particle-float 3s infinite ease-out;
      opacity: 0;
    }

    .thumb-particle:nth-child(1) { top: 70%; left: 30%; animation-delay: 0.2s; }
    .thumb-particle:nth-child(2) { top: 60%; left: 60%; animation-delay: 0.6s; }
    .thumb-particle:nth-child(3) { top: 50%; left: 40%; animation-delay: 1s; }
    .thumb-particle:nth-child(4) { top: 40%; left: 70%; animation-delay: 1.4s; }
    .thumb-particle:nth-child(5) { top: 80%; left: 50%; animation-delay: 1.8s; }

    @keyframes thumb-particle-float {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      20% { opacity: 0.8; }
      100% { transform: translateY(-30px) scale(0); opacity: 0; }
    }

    .toggle-data {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .data-text {
      position: absolute;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.5s ease;
    }

    .data-text.off {
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 1;
      color: rgba(255, 80, 80, 0.8);
      text-shadow: 0 0 5px rgba(255, 50, 50, 0.4);
    }

    .data-text.on {
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      color: rgba(0, 255, 150, 0.8);
      text-shadow: 0 0 5px rgba(0, 255, 100, 0.4);
    }

    .status-indicator {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(0, 180, 255, 0.8) 0%,
        rgba(0, 80, 200, 0.4) 100%
      );
      box-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
      animation: blink 2s infinite alternate;
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .status-indicator.off {
      top: 25px;
      right: 15px;
    }

    .status-indicator.on {
      top: 25px;
      left: 15px;
      opacity: 0;
      background: radial-gradient(
        circle,
        rgba(0, 255, 150, 0.8) 0%,
        rgba(0, 200, 80, 0.4) 100%
      );
      box-shadow: 0 0 10px rgba(0, 255, 150, 0.5);
    }

    @keyframes blink {
      0%, 100% { opacity: 0.5; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .energy-rings {
      position: absolute;
      width: 54px;
      height: 54px;
      left: 3px;
      top: 3px;
      pointer-events: none;
      z-index: 1;
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .energy-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid transparent;
      opacity: 0;
    }

    .energy-ring:nth-child(1) {
      width: 50px;
      height: 50px;
      border-top-color: rgba(0, 150, 255, 0.5);
      border-right-color: rgba(0, 150, 255, 0.3);
      animation: spin 3s linear infinite;
    }

    .energy-ring:nth-child(2) {
      width: 40px;
      height: 40px;
      border-bottom-color: rgba(0, 150, 255, 0.5);
      border-left-color: rgba(0, 150, 255, 0.3);
      animation: spin 2s linear infinite reverse;
    }

    .energy-ring:nth-child(3) {
      width: 30px;
      height: 30px;
      border-left-color: rgba(0, 150, 255, 0.5);
      border-top-color: rgba(0, 150, 255, 0.3);
      animation: spin 1.5s linear infinite;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .interface-lines {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .interface-line {
      position: absolute;
      background: rgba(0, 150, 255, 0.3);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .interface-line:nth-child(1) { width: 15px; height: 1px; bottom: -5px; left: 20px; }
    .interface-line:nth-child(2) { width: 1px; height: 8px; bottom: -12px; left: 35px; }
    .interface-line:nth-child(3) { width: 25px; height: 1px; bottom: -12px; left: 35px; }
    .interface-line:nth-child(4) { width: 15px; height: 1px; bottom: -5px; right: 20px; }
    .interface-line:nth-child(5) { width: 1px; height: 8px; bottom: -12px; right: 35px; }
    .interface-line:nth-child(6) { width: 25px; height: 1px; bottom: -12px; right: 10px; }

    .toggle-reflection {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.1) 0%,
        rgba(255, 255, 255, 0) 40%
      );
      border-radius: 30px;
      pointer-events: none;
    }

    .holo-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 30px;
      background: radial-gradient(
        ellipse at center,
        rgba(0, 150, 255, 0.2) 0%,
        rgba(0, 0, 0, 0) 70%
      );
      filter: blur(10px);
      opacity: 0.5;
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      z-index: 0;
    }

    .toggle-input:checked + .toggle-track {
      background: rgba(0, 60, 30, 0.4);
      border-color: rgba(0, 255, 150, 0.3);
      box-shadow:
        0 0 15px rgba(0, 255, 150, 0.2),
        inset 0 0 10px rgba(0, 0, 0, 0.8);
    }

    .toggle-input:checked + .toggle-track::before {
      background: radial-gradient(
          ellipse at center,
          rgba(0, 255, 150, 0.1) 0%,
          rgba(0, 0, 0, 0) 70%
        ),
        linear-gradient(90deg, rgba(0, 120, 60, 0.1) 0%, rgba(0, 60, 30, 0.2) 100%);
    }

    .toggle-input:checked + .toggle-track::after {
      background: linear-gradient(
        90deg,
        rgba(0, 255, 150, 0.3) 0%,
        rgba(0, 160, 80, 0.1) 100%
      );
    }

    .toggle-input:checked + .toggle-track .track-line {
      background: repeating-linear-gradient(
        90deg,
        rgba(0, 255, 150, 0.3) 0px,
        rgba(0, 255, 150, 0.3) 5px,
        transparent 5px,
        transparent 15px
      );
      animation-direction: reverse;
    }

    .toggle-input:checked + .toggle-track .toggle-thumb {
      left: calc(100% - 57px);
      background: radial-gradient(
        circle,
        rgba(10, 90, 40, 0.9) 0%,
        rgba(0, 50, 20, 0.8) 100%
      );
      border-color: rgba(0, 255, 150, 0.6);
      box-shadow:
        0 2px 15px rgba(0, 0, 0, 0.5),
        inset 0 0 15px rgba(0, 255, 150, 0.5);
    }

    .toggle-input:checked + .toggle-track .thumb-core {
      background: radial-gradient(
        circle,
        rgba(0, 255, 150, 0.6) 0%,
        rgba(0, 120, 50, 0.2) 100%
      );
      box-shadow: 0 0 20px rgba(0, 255, 150, 0.5);
    }

    .toggle-input:checked + .toggle-track .thumb-inner {
      background: radial-gradient(
        circle,
        rgba(255, 255, 255, 0.8) 0%,
        rgba(100, 255, 200, 0.5) 100%
      );
      box-shadow: 0 0 10px rgba(100, 255, 200, 0.7);
    }

    .toggle-input:checked + .toggle-track .thumb-scan {
      background: linear-gradient(
        90deg,
        rgba(0, 0, 0, 0) 0%,
        rgba(0, 255, 150, 0.5) 20%,
        rgba(255, 255, 255, 0.8) 50%,
        rgba(0, 255, 150, 0.5) 80%,
        rgba(0, 0, 0, 0) 100%
      );
    }

    .toggle-input:checked + .toggle-track .thumb-particle {
      background: rgba(100, 255, 200, 0.8);
      box-shadow: 0 0 5px rgba(100, 255, 200, 0.8);
    }

    .toggle-input:checked + .toggle-track .data-text.off { opacity: 0; }
    .toggle-input:checked + .toggle-track .data-text.on { opacity: 1; }
    .toggle-input:checked + .toggle-track .status-indicator.off { opacity: 0; }
    .toggle-input:checked + .toggle-track .status-indicator.on { opacity: 1; }

    .toggle-input:checked + .toggle-track .energy-rings {
      left: calc(100% - 57px);
    }

    .toggle-input:checked + .toggle-track .energy-ring { opacity: 1; }
    .toggle-input:checked + .toggle-track .energy-ring:nth-child(1) {
      border-top-color: rgba(0, 255, 150, 0.5);
      border-right-color: rgba(0, 255, 150, 0.3);
    }
    .toggle-input:checked + .toggle-track .energy-ring:nth-child(2) {
      border-bottom-color: rgba(0, 255, 150, 0.5);
      border-left-color: rgba(0, 255, 150, 0.3);
    }
    .toggle-input:checked + .toggle-track .energy-ring:nth-child(3) {
      border-left-color: rgba(0, 255, 150, 0.5);
      border-top-color: rgba(0, 255, 150, 0.3);
    }

    .toggle-input:checked + .toggle-track .interface-line {
      background: rgba(0, 255, 150, 0.3);
    }

    .toggle-input:checked + .toggle-track .holo-glow {
      background: radial-gradient(
        ellipse at center,
        rgba(0, 255, 150, 0.2) 0%,
        rgba(0, 0, 0, 0) 70%
      );
    }

    .toggle-input:hover + .toggle-track {
      box-shadow:
        0 0 20px rgba(0, 150, 255, 0.3),
        inset 0 0 10px rgba(0, 0, 0, 0.8);
    }

    .toggle-input:checked:hover + .toggle-track {
      box-shadow:
        0 0 20px rgba(0, 255, 150, 0.3),
        inset 0 0 10px rgba(0, 0, 0, 0.8);
    }
  </style>
</head>
<body>

  <main>
    <div class="content">

      <div class="header-area">
        <div class="header-row">
          <div class="app-title">小宝伴眠助手</div>
          <div class="toggle-wrapper">
            <span class="toggle-label-text">自动音量开关</span>
            <div class="toggle-container">
              <div class="toggle-wrap">
                <input class="toggle-input" id="holo-toggle" type="checkbox" checked />
                <label class="toggle-track" for="holo-toggle">
                  <div class="track-lines"><div class="track-line"></div></div>
                  <div class="toggle-thumb">
                    <div class="thumb-core"></div>
                    <div class="thumb-inner"></div>
                    <div class="thumb-scan"></div>
                    <div class="thumb-particles">
                      <div class="thumb-particle"></div>
                      <div class="thumb-particle"></div>
                      <div class="thumb-particle"></div>
                      <div class="thumb-particle"></div>
                      <div class="thumb-particle"></div>
                    </div>
                  </div>
                  <div class="toggle-data">
                    <div class="data-text off">OFF</div>
                    <div class="data-text on">ON</div>
                    <div class="status-indicator off"></div>
                    <div class="status-indicator on"></div>
                  </div>
                  <div class="energy-rings">
                    <div class="energy-ring"></div>
                    <div class="energy-ring"></div>
                    <div class="energy-ring"></div>
                  </div>
                  <div class="interface-lines">
                    <div class="interface-line"></div>
                    <div class="interface-line"></div>
                    <div class="interface-line"></div>
                    <div class="interface-line"></div>
                    <div class="interface-line"></div>
                    <div class="interface-line"></div>
                  </div>
                  <div class="toggle-reflection"></div>
                  <div class="holo-glow"></div>
                </label>
              </div>
            </div>
          </div>
        </div>
        <div class="swiper">
          <div class="swiper-wrapper">
            <div class="swiper-slide">
              <img src="picture/1hongqiqiu.jpg" />
              <h1>红气球</h1>
            </div>
            <div class="swiper-slide">
              <img src="picture/2niaokuzi.jpg" />
              <h1>尿裤子</h1>
            </div>
            <div class="swiper-slide">
              <img src="picture/3huabanche.jpg" />
              <h1>滑板车</h1>
            </div>
            <div class="swiper-slide">
              <img src="picture/4daguaishou.jpg" />
              <h1>大怪兽</h1>
            </div>
            <div class="swiper-slide">
              <img src="picture/5duixueren.jpg" />
              <h1>堆雪人</h1>
            </div>
          </div>
        </div>
      </div>

      <div class="playlist-scroll">
        <div class="playlist-item" data-index="0">
          <div class="pl-cover"><img src="picture/1hongqiqiu.jpg" alt="" /></div>
          <div class="song">
            <p>红气球</p>
            <p>快乐飞行</p>
          </div>
          <p class="pl-duration">3:01</p>
          <div class="pl-progress-row"><input type="range" class="item-progress" value="0" min="0" /></div>
        </div>
        <div class="playlist-item" data-index="1">
          <div class="pl-cover"><img src="picture/2niaokuzi.jpg" alt="" /></div>
          <div class="song">
            <p>尿裤子</p>
            <p>尴尬时刻</p>
          </div>
          <p class="pl-duration">2:38</p>
          <div class="pl-progress-row"><input type="range" class="item-progress" value="0" min="0" /></div>
        </div>
        <div class="playlist-item" data-index="2">
          <div class="pl-cover"><img src="picture/3huabanche.jpg" alt="" /></div>
          <div class="song">
            <p>滑板车</p>
            <p>自由滑行</p>
          </div>
          <p class="pl-duration">3:31</p>
          <div class="pl-progress-row"><input type="range" class="item-progress" value="0" min="0" /></div>
        </div>
        <div class="playlist-item" data-index="3">
          <div class="pl-cover"><img src="picture/4daguaishou.jpg" alt="" /></div>
          <div class="song">
            <p>大怪兽</p>
            <p>勇敢冒险</p>
          </div>
          <p class="pl-duration">3:23</p>
          <div class="pl-progress-row"><input type="range" class="item-progress" value="0" min="0" /></div>
        </div>
        <div class="playlist-item" data-index="4">
          <div class="pl-cover"><img src="picture/5duixueren.jpg" alt="" /></div>
          <div class="song">
            <p>堆雪人</p>
            <p>冬日乐趣</p>
          </div>
          <p class="pl-duration">2:37</p>
          <div class="pl-progress-row"><input type="range" class="item-progress" value="0" min="0" /></div>
        </div>
      </div>

      <div class="bottom-bar">
        <div class="volume-stack">
          <div class="volume-panel">
            <span class="vp-label">故事</span>
            <i class="fa-solid fa-book vp-icon"></i>
            <input type="range" id="story-volume" min="0" max="100" value="80" />
          </div>
          <div class="volume-panel">
            <span class="vp-label">音乐</span>
            <i class="fa-solid fa-music vp-icon"></i>
            <input type="range" id="bgm-volume" min="0" max="100" value="40" />
          </div>
        </div>
        <div class="play-btn-wrap">
          <button id="playPauseBtn">
            <i class="fa-solid fa-play" id="playPauseIcon"></i>
          </button>
        </div>
      </div>

      <audio id="audioPlayer" src="audio/3huabanche.mp3" type="audio/mpeg"></audio>
      <audio id="bgmPlayer" src="audio/BGM.mp3" type="audio/mpeg" loop></audio>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const playlistItems = document.querySelectorAll(".playlist-item");
    const audioPlayer = document.getElementById("audioPlayer");
    const bgmPlayer = document.getElementById("bgmPlayer");
    const storyVolume = document.getElementById("story-volume");
    const bgmVolume = document.getElementById("bgm-volume");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const playPauseIcon = document.getElementById("playPauseIcon");
    const holoToggle = document.getElementById("holo-toggle");

    let currentSongIndex = 2;
    let isSongLoaded = false;
    let songPlayCount = 0;
    let baseStoryVol = 80;
    let baseBgmVol = 40;

    const songs = [
      "audio/1hongqiqiu.mp3",
      "audio/2niaokuzi.mp3",
      "audio/3huabanche.mp3",
      "audio/4daguaishou.mp3",
      "audio/5xiaxuetian.mp3",
    ];

    audioPlayer.volume = baseStoryVol / 100;
    bgmPlayer.volume = baseBgmVol / 100;

    var swiper = new Swiper(".swiper", {
      effect: "cards",
      cardsEffect: {
        perSlideOffset: 9,
        perSlideRotate: 3,
      },
      grabCursor: true,
      speed: 700,
      initialSlide: 2,
    });

    swiper.on("slideChange", () => {
      const newIndex = swiper.realIndex;
      if (newIndex !== currentSongIndex) {
        currentSongIndex = newIndex;
        songPlayCount = 0;
        baseStoryVol = parseInt(storyVolume.value);
        baseBgmVol = parseInt(bgmVolume.value);
        loadAndPlaySong(currentSongIndex);
      }
    });

    function updateSwiperToMatchSong(index) {
      if (swiper.activeIndex !== index) {
        swiper.slideTo(index);
      }
    }

    function updatePlaylistHighlight(index) {
      playlistItems.forEach((item, i) => {
        if (i === index) {
          item.classList.add("active-playlist-item");
          item.classList.add("is-playing");
        } else {
          item.classList.remove("active-playlist-item");
          item.classList.remove("is-playing");
          const bar = item.querySelector(".item-progress");
          bar.value = 0;
        }
      });
    }

    function loadAndPlaySong(index) {
      audioPlayer.src = songs[index];
      playSong();
      updatePlaylistHighlight(index);
      updateSwiperToMatchSong(index);
      isSongLoaded = true;
    }

    function playSong() {
      audioPlayer.play();
      bgmPlayer.play();
      updatePlayPauseIcon(true);
    }

    function pauseSong() {
      audioPlayer.pause();
      bgmPlayer.pause();
      updatePlayPauseIcon(false);
    }

    function togglePlayPause() {
      if (!isSongLoaded) {
        loadAndPlaySong(currentSongIndex);
        isSongLoaded = true;
      } else if (audioPlayer.paused) {
        playSong();
      } else {
        pauseSong();
      }
    }

    function updatePlayPauseIcon(isPlaying) {
      if (isPlaying) {
        playPauseIcon.classList.add("fa-pause");
        playPauseIcon.classList.remove("fa-play");
      } else {
        playPauseIcon.classList.add("fa-play");
        playPauseIcon.classList.remove("fa-pause");
      }
    }

    function applyVolumeDecay() {
      if (!holoToggle.checked) return;
      songPlayCount++;
      const newStory = Math.max(0, baseStoryVol - songPlayCount * 10);
      const newBgm = Math.max(0, baseBgmVol - songPlayCount * 10);
      audioPlayer.volume = newStory / 100;
      bgmPlayer.volume = newBgm / 100;
      storyVolume.value = newStory;
      bgmVolume.value = newBgm;
    }

    function nextSong() {
      applyVolumeDecay();
      currentSongIndex = (currentSongIndex + 1) % songs.length;
      loadAndPlaySong(currentSongIndex);
      swiper.slideTo(currentSongIndex);
    }

    playlistItems.forEach((item, index) => {
      item.addEventListener("click", (e) => {
        if (e.target.closest(".item-progress")) return;
        currentSongIndex = index;
        songPlayCount = 0;
        baseStoryVol = parseInt(storyVolume.value);
        baseBgmVol = parseInt(bgmVolume.value);
        loadAndPlaySong(index);
      });
    });

    playPauseBtn.addEventListener("click", togglePlayPause);

    audioPlayer.addEventListener("loadedmetadata", () => {
      const activeItem = document.querySelector(".playlist-item.is-playing");
      if (activeItem) {
        const bar = activeItem.querySelector(".item-progress");
        bar.max = audioPlayer.duration;
        bar.value = audioPlayer.currentTime;
      }
    });

    audioPlayer.addEventListener("timeupdate", () => {
      if (!audioPlayer.paused) {
        const activeItem = document.querySelector(".playlist-item.is-playing");
        if (activeItem) {
          const bar = activeItem.querySelector(".item-progress");
          bar.value = audioPlayer.currentTime;
        }
      }
    });

    document.querySelectorAll(".item-progress").forEach((bar) => {
      bar.addEventListener("input", () => {
        audioPlayer.currentTime = bar.value;
      });
      bar.addEventListener("change", () => {
        playSong();
      });
    });

    storyVolume.addEventListener("input", () => {
      audioPlayer.volume = storyVolume.value / 100;
      baseStoryVol = parseInt(storyVolume.value);
      songPlayCount = 0;
    });

    bgmVolume.addEventListener("input", () => {
      bgmPlayer.volume = bgmVolume.value / 100;
      baseBgmVol = parseInt(bgmVolume.value);
      songPlayCount = 0;
    });

    audioPlayer.addEventListener("ended", nextSong);
  </script>
</body>
</html>
